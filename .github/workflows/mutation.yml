name: Mutation Testing

on:
  workflow_dispatch:

concurrency:
  group: mutation-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mutmut:
    name: Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run mutation testing
        run: uv run mutmut run || true

      - name: Collect results
        run: uv run mutmut results 2>&1 | tee mutmut-results.txt

      - name: Write job summary
        run: |
          {
            echo "## Mutation Testing Results"
            echo
            echo "Full results are available as the \`mutation-results\` artifact on this run."
            echo
            echo '```'
            tail -200 mutmut-results.txt 2>/dev/null || echo "(no results)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload raw results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-results
          path: |
            mutmut-results.txt
            mutants/
          retention-days: 14
          if-no-files-found: warn
