name: Mutation Testing

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
  workflow_dispatch:

concurrency:
  group: mutation-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  mutmut:
    name: Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run mutation testing
        run: uv run mutmut run --no-progress 2>&1 | tee mutmut-output.txt || true

      - name: Collect results
        id: results
        run: |
          RESULTS=$(uv run mutmut results 2>&1) || true
          echo "$RESULTS"

          KILLED=$(echo "$RESULTS" | grep -oP 'Killed \K[0-9]+' || echo "0")
          TOTAL=$(echo "$RESULTS" | grep -oP 'out of \K[0-9]+' || echo "0")

          if [ "$TOTAL" -gt 0 ]; then
            SURVIVED=$((TOTAL - KILLED))
            SCORE=$(( (KILLED * 100) / TOTAL ))
          else
            SURVIVED=0
            SCORE=0
          fi

          echo "killed=$KILLED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "survived=$SURVIVED" >> "$GITHUB_OUTPUT"
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"

          SURVIVORS=$(echo "$RESULTS" | grep -A 1000 "Survived" || echo "None")
          {
            echo "survivors<<GHEOF"
            echo "$SURVIVORS"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Write job summary
        run: |
          SCORE="${{ steps.results.outputs.score }}"
          KILLED="${{ steps.results.outputs.killed }}"
          TOTAL="${{ steps.results.outputs.total }}"
          SURVIVED="${{ steps.results.outputs.survived }}"

          if [ "$SCORE" -ge 90 ]; then
            BADGE="đźź˘"
          elif [ "$SCORE" -ge 75 ]; then
            BADGE="đźźˇ"
          else
            BADGE="đź”´"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ${BADGE} Mutation Testing Results

          | Metric | Value |
          |--------|-------|
          | Mutation score | **${SCORE}%** |
          | Mutants killed | ${KILLED} |
          | Mutants survived | ${SURVIVED} |
          | Total mutants | ${TOTAL} |

          <details>
          <summary>Surviving mutants (click to expand)</summary>

          \`\`\`
          ${{ steps.results.outputs.survivors }}
          \`\`\`

          </details>
          EOF

      - name: Generate HTML report
        if: always()
        run: uv run mutmut html || true

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: html/
          retention-days: 14
