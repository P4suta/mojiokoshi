name: Mutation Testing

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
  workflow_dispatch:

concurrency:
  group: mutation-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  mutmut:
    name: Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run mutation testing
        run: uv run mutmut run || true

      - name: Collect results
        id: results
        run: |
          uv run mutmut results > mutmut-results.txt 2>&1 || true
          cat mutmut-results.txt

          # mutmut 2.x jemalloc summary format
          uv run mutmut jemalloc 2>/dev/null || true

          # Parse summary from mutmut results
          # Format: "To apply a mutant on disk: ..." or status lines
          KILLED=$(uv run mutmut results 2>&1 | grep -c "Killed" || true)
          SURVIVED=$(uv run mutmut results 2>&1 | grep -c "Survived" || true)
          TIMEOUT=$(uv run mutmut results 2>&1 | grep -c "Timeout" || true)
          TOTAL=$((KILLED + SURVIVED + TIMEOUT))

          if [ "$TOTAL" -gt 0 ]; then
            SCORE=$(( (KILLED * 100) / TOTAL ))
          else
            SCORE=0
          fi

          echo "killed=$KILLED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "survived=$SURVIVED" >> "$GITHUB_OUTPUT"
          echo "timeout=$TIMEOUT" >> "$GITHUB_OUTPUT"
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"

          SURVIVORS=$(uv run mutmut results 2>&1 | grep "Survived" || echo "None")
          {
            echo "survivors<<GHEOF"
            echo "$SURVIVORS"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Write job summary
        run: |
          SCORE="${{ steps.results.outputs.score }}"
          KILLED="${{ steps.results.outputs.killed }}"
          TOTAL="${{ steps.results.outputs.total }}"
          SURVIVED="${{ steps.results.outputs.survived }}"
          TIMEOUT="${{ steps.results.outputs.timeout }}"

          if [ "$SCORE" -ge 90 ]; then
            BADGE="🟢"
          elif [ "$SCORE" -ge 75 ]; then
            BADGE="🟡"
          else
            BADGE="🔴"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ${BADGE} Mutation Testing Results

          | Metric | Value |
          |--------|-------|
          | Mutation score | **${SCORE}%** |
          | Mutants killed | ${KILLED} |
          | Mutants survived | ${SURVIVED} |
          | Timed out | ${TIMEOUT} |
          | Total mutants | ${TOTAL} |

          <details>
          <summary>Surviving mutants (click to expand)</summary>

          \`\`\`
          ${{ steps.results.outputs.survivors }}
          \`\`\`

          </details>
          EOF

      - name: Upload raw results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-results
          path: mutmut-results.txt
          retention-days: 14
