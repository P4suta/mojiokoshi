name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "frontend/package.json"
      - "frontend/bun.lock"
      - "frontend/src/**"
      - "frontend/svelte.config.js"
      - "frontend/vite.config.ts"
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "frontend/package.json"
      - "frontend/bun.lock"
      - "frontend/src/**"
      - "frontend/svelte.config.js"
      - "frontend/vite.config.ts"
  workflow_dispatch:

concurrency:
  group: docker-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Default-deny at workflow level; jobs that need more opt in explicitly.
permissions:
  contents: read

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # security-events: write is required by github/codeql-action/upload-sarif
    # so Trivy findings land under the repo's Code Scanning alerts tab.
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: mojiokoshi:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: mojiokoshi:ci
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4.35.1
        with:
          sarif_file: trivy.sarif
          category: trivy

      - name: Write job summary
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Docker Build Results

          | Item | Value |
          |------|-------|
          | Image | \`mojiokoshi:ci\` |
          | Status | Passed |
          | Digest | \`${DIGEST}\` |
          | Scan   | Trivy results uploaded to Security tab |

          ### Run locally
          \`\`\`bash
          docker compose build
          docker compose up
          \`\`\`
          EOF
