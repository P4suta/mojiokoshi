name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default-deny at workflow level; individual jobs opt into specific perms.
permissions:
  contents: read

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - run: uv sync --frozen --only-group dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run pyrefly check --output-format=github

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests with coverage
        run: uv run pytest -m "not integration and not slow"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  frontend-check:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Svelte check
        run: bun run check

      - name: Run tests
        run: bun run test || echo "No tests found, skipping"

      - name: Build
        run: bun run build

  dockerfile-lint:
    name: Dockerfile Lint (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  actionlint:
    name: Actions Lint (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: raven-actions/actionlint@v2.1.2

  zizmor:
    name: Actions Security Scan (zizmor)
    runs-on: ubuntu-latest
    # security-events: write is required by github/codeql-action/upload-sarif
    # so zizmor findings land under the repo's Code Scanning alerts tab.
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v8.0.0

      # Pre-seed with a valid, empty SARIF so upload-sarif always has a file
      # to consume, even if zizmor crashes or produces no output.
      - name: Seed empty SARIF
        run: |
          printf '%s\n' '{"version":"2.1.0","runs":[]}' > zizmor.sarif

      - name: zizmor (GitHub Actions security lint)
        run: uvx zizmor --format sarif . > zizmor.sarif
        continue-on-error: true

      - name: Upload zizmor SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4.35.1
        with:
          sarif_file: zizmor.sarif
          category: zizmor

